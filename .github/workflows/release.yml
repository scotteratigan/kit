name: release

on:
  push:
    branches: ["main"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ">=1.22.0"
          cache: true

      - run: go generate -v ./...
      - run: go vet -v ./...
      - run: go test -v ./...

      # Determine the next semantic version from conventional commits since the
      # last tag (fix -> patch, feat -> minor, BREAKING CHANGE/! -> major).
      # With default_bump=false, commits like docs/chore produce no tag and the
      # release steps below are skipped.
      - name: Bump version and tag
        id: tag
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: false
          tag_prefix: v

      # https://gist.github.com/asukakenji/f15ba7e588ac42795f421b48b8aede63
      - name: Build binaries
        if: steps.tag.outputs.new_tag
        env:
          CGO_ENABLED: "0"
          TAG: ${{ steps.tag.outputs.new_tag }}
        run: |
          GOOS=darwin GOARCH=amd64 go build -o kit_${TAG}_darwin_amd64 .
          GOOS=darwin GOARCH=arm64 go build -o kit_${TAG}_darwin_arm64 .
          GOOS=linux GOARCH=386 go build -o kit_${TAG}_linux_386 .
          GOOS=linux GOARCH=amd64 go build -o kit_${TAG}_linux_amd64 .
          GOOS=linux GOARCH=arm64 go build -o kit_${TAG}_linux_arm64 .
          shasum -a 256 kit_* > checksums.txt

      - name: Create GitHub Release
        if: steps.tag.outputs.new_tag
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.new_tag }}
          body: ${{ steps.tag.outputs.changelog }}
          files: |
            kit_${{ steps.tag.outputs.new_tag }}_darwin_amd64
            kit_${{ steps.tag.outputs.new_tag }}_darwin_arm64
            kit_${{ steps.tag.outputs.new_tag }}_linux_386
            kit_${{ steps.tag.outputs.new_tag }}_linux_amd64
            kit_${{ steps.tag.outputs.new_tag }}_linux_arm64
            checksums.txt
