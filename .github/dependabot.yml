version: 2
updates:
  # Keep SHA-pinned actions up to date; the pin stays a full commit SHA.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      # chore(deps) is deliberate: it does not trigger a release. Change to
      # "fix(deps)" if you want dependency bumps to publish a patch release.
      prefix: "chore(deps)"

  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: "chore(deps)"
